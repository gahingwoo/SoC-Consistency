name: Publish to PyPI (Trusted Publishing)

# Triggered when a version tag vX.Y.Z is pushed.
# Requires PyPI Trusted Publishing to be configured for this repo:
#   https://pypi.org/manage/project/soc-consistency/settings/publishing/
#
# Settings to add on PyPI:
#   Owner:     gahingwoo
#   Repo:      SoC-Consistency
#   Workflow:  publish.yml
#   Environment: pypi   (or leave blank for no environment gate)

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]*"

permissions:
  contents: read

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build
        run: pip install build

      - name: Build sdist and wheel
        run: python -m build

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment: pypi        # optional: add a GitHub environment with protection rules

    permissions:
      id-token: write        # REQUIRED for OIDC trusted publishing

    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        # No username/password/token needed — OIDC handles auth.

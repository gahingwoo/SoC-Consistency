# Amlogic SM1 (S905X3/S905D3/S905Y3) SoC constraint definitions
# CPU: 4x Cortex-A55 (up to 2.016 GHz)
# GPU: Mali-G31 MP2 (up to 650 MHz)
# NPU: 1.2 TOPS
# Used in: Hardkernel ODROID-C4, Beelink GT-Nano, Khadas VIM3L
# Compatible string: amlogic,meson-sm1
# Source: mainline Linux arch/arm64/boot/dts/amlogic/

soc:
  name: meson-sm1
  version: "1.0"
  description: "Amlogic SM1 (S905X3/D3/Y3) Cortex-A55 SoC with NPU"

power_domains:
  - name: PD_VDD_CPU
    voltage_range: [0.73, 1.0]
    description: "Cortex-A55 CPU core power (DVFS)"
    regulators:
      - vdd_cpu

  - name: PD_VDD_GPU
    voltage_range: [0.6, 0.9]
    description: "GPU Mali-G31 power domain"
    regulators:
      - vdd_gpu

  - name: PD_VDD_EE
    voltage_range: [0.85, 1.0]
    description: "SoC EE logic core"
    regulators:
      - vdd_ee

  - name: PD_VCC_3V3
    voltage_range: [3.0, 3.6]
    description: "3.3V peripheral IO"
    regulators:
      - vcc_3v3

  - name: PD_VCC_1V8
    voltage_range: [1.62, 1.98]
    description: "1.8V IO"
    regulators:
      - vcc_1v8

  - name: PD_VDDAO
    voltage_range: [0.9, 1.05]
    description: "Always-On domain"
    regulators:
      - vddao

clock_providers:
  - name: clkc
    type: clkc
    base: 0xFF63C000
    compatible: "amlogic,meson-sm1-clkc"
    description: "SM1 Main Clock Controller"
    outputs:
      - clk_cpu
      - clk_ddr
      - clk_eth
      - clk_sd_emmc_a
      - clk_sd_emmc_b
      - clk_sd_emmc_c
      - clk_usb
      - clk_i2c
      - clk_spi
      - clk_uart0
      - clk_uart1
      - clk_npu

  - name: ao_clkc
    type: clkc
    base: 0xFF800000
    compatible: "amlogic,meson-sm1-aoclkc"
    description: "SM1 Always-On Clock Controller"
    outputs:
      - clk_ao_i2c
      - clk_ao_uart

clock_specifications:
  i2c_clk_range:
    min_freq: 100000
    max_freq: 400000

  uart_baudrate_range:
    min: 9600
    max: 4000000

  spi_clk_range:
    min_freq: 1000000
    max_freq: 100000000

gpio_banks:
  - bank: GPIOZ
    base: 0xFF634480
    pins: 16
    voltage: 3.3
    compatible: "amlogic,meson-sm1-periphs-pinctrl"
    description: "GPIOZ bank"

  - bank: GPIOH
    base: 0xFF634480
    pins: 9
    voltage: 3.3
    description: "GPIOH bank"

  - bank: BOOT
    base: 0xFF634480
    pins: 16
    voltage: 3.3
    description: "BOOT bank"

  - bank: GPIOC
    base: 0xFF634480
    pins: 8
    voltage: 1.8
    description: "GPIOC bank (1.8V)"

  - bank: GPIOA
    base: 0xFF634480
    pins: 16
    voltage: 1.8
    description: "GPIOA bank (1.8V)"

  - bank: GPIOX
    base: 0xFF634480
    pins: 20
    voltage: 3.3
    description: "GPIOX bank"

  - bank: GPIOAO
    base: 0xFF800014
    compatible: "amlogic,meson-sm1-aobus-pinctrl"
    pins: 16
    voltage: 3.3
    description: "GPIOAO always-on bank"

device_constraints:
  npu:
    required_clocks: [clk_npu]
    required_supplies: [vdd_ee]
    description: "1.2 TOPS NPU"

  i2c_ao:
    required_clocks: [clk_ao_i2c]
    required_supplies: [vddao]
    max_pins: 2

  uart_ao:
    required_clocks: [clk_ao_uart]
    required_supplies: [vddao]
    max_pins: 4

power_tree_constraints:
  root_supplies:
    - vcc_5v

  pmic_outputs:
    - vdd_cpu
    - vdd_gpu
    - vdd_ee
    - vddao
    - vcc_3v3
    - vcc_1v8

version_history:
  - version: "1.0"
    date: "2026-05-16"
    description: "Initial SM1/S905X3 constraints based on mainline DTS"

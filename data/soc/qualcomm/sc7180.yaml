soc: sc7180
compatible: "qcom,sc7180"
description: "Qualcomm SC7180 — 2x Kryo 468 Gold + 6x Silver, Chromebook platform"
cpu:
  big_cores: 2
  big_type: kryo-468-gold
  little_cores: 6
  little_type: kryo-468-silver
  max_freq_big_mhz: 2044
  max_freq_little_mhz: 1800
gpu:
  type: adreno-618
gcc:
  base: 0x00100000
  compatible: "qcom,sc7180-gcc"
rpmh_clk:
  compatible: "qcom,sc7180-rpmh-clk"
rpmpd:
  compatible: "qcom,sc7180-rpmhpd"
tlmm:
  base: 0x03500000
  compatible: "qcom,sc7180-tlmm"
  gpio_count: 119
spmi_bus:
  base: 0x0C000000
  compatible: "qcom,spmi-pmic-arb"
gpio_banks:
  - bank: tlmm
    voltage_v: 1.8
power_domains:
  - name: cx
    required: true
  - name: mx
    required: true
  - name: mmcx
    description: "Multimedia CX"
pmic:
  name: PM6150
  description: "Qualcomm PM6150 (Chromebook variant)"
  key_rails:
    - name: vdd_cx
    - name: vdd_mx
clocks:
  max_cpu_big_hz: 2044000000
  max_cpu_little_hz: 1800000000
  max_gpu_hz: 500000000
  ref_hz: 19200000
subsystems:
  - name: adsp
    description: "Audio DSP"
  - name: cdsp
    description: "Compute DSP"
note: "Widely used in ARM Chromebooks (Lenovo Flex 5i/5, HP Chromebook x2 11)"

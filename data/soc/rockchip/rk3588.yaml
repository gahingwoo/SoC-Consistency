    # NC / reserved
    AB1: { type: nc,     name: NC }
    AB2: { type: nc,     name: NC }
    AB3: { type: ground, name: GND }
    AB4: { type: power,  name: VDD_IN }
    AB5: { type: power,  name: VDD_IN }

# 版本历史
version_history:
  - version: "1.0"
    date: "2026-02-02"
    description: "Initial version"
